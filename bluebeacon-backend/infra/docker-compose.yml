version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: bluebeacon-postgres
    environment:
      POSTGRES_USER: bluebeacon
      POSTGRES_PASSWORD: bluebeacon
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: bluebeacon-redis
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    container_name: bluebeacon-nats
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  minio:
    image: minio/minio:latest
    container_name: bluebeacon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  clamav:
    image: clamav/clamav:latest
    container_name: bluebeacon-clamav
    ports:
      - "3310:3310"

  traefik:
    image: traefik:v3.0
    container_name: bluebeacon-traefik
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres_data:
  minio_data:
